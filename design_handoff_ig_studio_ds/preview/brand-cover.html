<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.cover { width:96px; height:96px; border-radius:8px; overflow:hidden; position:relative; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08); }
.cover img { width:100%; height:100%; object-fit:cover; display:block; }
.cover.sketch { background:#f3ecdc; }
.sketch svg { width:100%; height:100%; display:block; }
</style>
</head><body>
<div class="card">
  <div class="lbl">Cover treatment — photo vs. fresh-draft sketch</div>
  <div class="row" style="gap:14px;align-items:flex-start;">
    <div class="cover"><img src="../assets/cover.png" alt=""></div>
    <div class="cover sketch">
      <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="paper"><feTurbulence baseFrequency="0.8" numOctaves="2" seed="3"/><feColorMatrix values="0 0 0 0 0.17  0 0 0 0 0.15  0 0 0 0 0.12  0 0 0 0.05 0"/><feComposite in2="SourceGraphic" operator="in"/></filter>
        </defs>
        <rect width="96" height="96" fill="#f3ecdc"/>
        <rect width="96" height="96" fill="#000" filter="url(#paper)" opacity="0.4"/>
        <g fill="none" stroke="#2a2620" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M30 26 L20 32 L24 70 L72 70 L76 32 L66 26 L60 30 L48 32 L36 30 Z"/>
          <path d="M36 30 L42 38 L48 32 L54 38 L60 30"/>
          <path d="M48 38 L48 70"/>
        </g>
      </svg>
    </div>
    <div style="font-size:11.5px;color:var(--ink-3);max-width:240px;">Photo covers use a 1px inset ring to protect against bright whites. <br><br>"Fresh draft" covers (no photo yet) use a hand-sketched SVG on cream paper with grain — the only illustrative treatment in the system.</div>
  </div>
</div>
</body></html>
