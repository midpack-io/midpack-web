<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="lbl">Shadow ladder — low-tone, blueish-black</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:16px 6px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:88px;height:60px;background:#fff;border:1px solid #e6e6e1;border-radius:8px;box-shadow:0 1px 2px rgba(20,20,28,.04);"></div><div class="mono">sm</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:88px;height:60px;background:#fff;border:1px solid #e6e6e1;border-radius:8px;box-shadow:0 4px 16px -4px rgba(20,20,28,.08), 0 2px 4px rgba(20,20,28,.04);"></div><div class="mono">md</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:88px;height:60px;background:#fff;border:1px solid #e6e6e1;border-radius:8px;box-shadow:0 12px 28px -10px rgba(20,20,28,.16), 0 4px 10px -4px rgba(20,20,28,.08);"></div><div class="mono">lg</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><div style="width:88px;height:60px;background:#16161a;border-radius:8px;box-shadow:0 1px 2px rgba(20,20,28,.12), 0 4px 12px -4px rgba(20,20,28,.18);"></div><div class="mono">cta</div></div>
  </div>
</div>
</body></html>
