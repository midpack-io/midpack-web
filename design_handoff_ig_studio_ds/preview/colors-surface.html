<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="lbl">Surfaces — warm off-white</div>
  <div class="swatch-strip" style="--n:4;">
    <div class="swatch-cell"><div class="swatch" style="background:#f7f7f5;"></div><div class="name">bg</div><div class="hex">#f7f7f5</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#ffffff;"></div><div class="name">surface</div><div class="hex">#ffffff</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#fafaf8;"></div><div class="name">surface-2</div><div class="hex">#fafaf8</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#f1f1ee;"></div><div class="name">surface-3</div><div class="hex">#f1f1ee</div></div>
  </div>
  <hr class="divline" style="margin-top:8px;">
  <div class="lbl">Borders</div>
  <div class="swatch-strip" style="--n:2;">
    <div class="swatch-cell"><div class="swatch" style="background:#fff;border:1px solid #e6e6e1;"></div><div class="name">border</div><div class="hex">#e6e6e1</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#fff;border:1px solid #d4d4cf;"></div><div class="name">border-strong</div><div class="hex">#d4d4cf</div></div>
  </div>
</div>
</body></html>
