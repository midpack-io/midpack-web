<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="lbl">Border-radius ladder</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:56px;height:56px;background:#fff;border:1px solid #d4d4cf;border-radius:4px;"></div><div class="mono">4px</div><div style="font-size:10px;color:var(--ink-4);">pill</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:56px;height:56px;background:#fff;border:1px solid #d4d4cf;border-radius:5px;"></div><div class="mono">5px</div><div style="font-size:10px;color:var(--ink-4);">chip</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:56px;height:56px;background:#fff;border:1px solid #d4d4cf;border-radius:6px;"></div><div class="mono">6px</div><div style="font-size:10px;color:var(--ink-4);">input</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:56px;height:56px;background:#fff;border:1px solid #d4d4cf;border-radius:7px;"></div><div class="mono">7px</div><div style="font-size:10px;color:var(--ink-4);">button</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:56px;height:56px;background:#fff;border:1px solid #d4d4cf;border-radius:8px;"></div><div class="mono">8px</div><div style="font-size:10px;color:var(--ink-4);">card</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:56px;height:56px;background:#fff;border:1px solid #d4d4cf;border-radius:10px;"></div><div class="mono">10px</div><div style="font-size:10px;color:var(--ink-4);">cover</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:56px;height:56px;background:#fff;border:1px solid #d4d4cf;border-radius:12px;"></div><div class="mono">12px</div><div style="font-size:10px;color:var(--ink-4);">row</div></div>
  </div>
</div>
</body></html>
