<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.pill-inline { font-family:var(--font-mono); font-size:11px; color:var(--ink-2); background:var(--surface-3); padding:3px 6px 2px; display:inline-flex; align-items:center; border-radius:4px; box-shadow:inset 0 0 0 1px rgba(0,0,0,0.02); white-space:nowrap; line-height:1; text-transform:uppercase; letter-spacing:0.04em; font-weight:500; }
.pill-inline.indigo { color:var(--accent-ink); background:var(--accent-soft); box-shadow:inset 0 0 0 1px rgba(79,70,229,0.12); }
.pill-inline.green { color:var(--ok); background:var(--ok-soft); box-shadow:inset 0 0 0 1px rgba(47,122,74,0.14); }
.pill-inline.amber { color:var(--warn); background:var(--warn-soft); box-shadow:inset 0 0 0 1px rgba(180,83,9,0.16); }
.pill-inline.pink { color:#9d2b5a; background:#fbe7ef; box-shadow:inset 0 0 0 1px rgba(157,43,90,0.14); }
.pill-inline.slate { color:#334155; background:#e6ebf2; box-shadow:inset 0 0 0 1px rgba(51,65,85,0.12); }
.pill-inline.teal { color:#0f6e6a; background:#d8efed; box-shadow:inset 0 0 0 1px rgba(15,110,106,0.14); }
.pill-inline.pill-add { background:transparent; color:var(--ink-3); border:1px dashed var(--border-strong); font-size:11px; gap:3px; box-shadow:none; padding:2px 6px 1px 5px; }
.pill-inline.pill-add:hover { color:var(--ink-1); background:var(--surface-3); border-color:var(--ink-4); cursor:pointer; }
</style>
</head><body>
<div class="card">
  <div class="lbl">Pill-inline tags — inline mono in row-meta</div>
  <div class="row" style="gap:4px;flex-wrap:wrap;">
    <span class="pill-inline">DRAFT</span>
    <span class="pill-inline indigo">CARDIGAN</span>
    <span class="pill-inline green">CAMEL</span>
    <span class="pill-inline amber">FW25</span>
    <span class="pill-inline pink">CAPSULE</span>
    <span class="pill-inline slate">EVENT</span>
    <span class="pill-inline teal">SUSTAIN</span>
    <span class="pill-inline pill-add">+ TAG</span>
  </div>
  <div class="mono" style="color:var(--ink-4);margin-top:8px;">7 hues + dashed add \u2014 uppercase mono, ~16px tall, r:4, inset 1px (solid pills) / 1px dashed (add)</div>
</div>
</body></html>
