<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.ws-pill { display:inline-flex; align-items:center; gap:8px; padding:4px 10px 4px 4px; border-radius:7px; background:var(--surface-2); border:1px solid var(--border); }
.ws-mark { width:24px; height:24px; border-radius:5px; background:linear-gradient(135deg,#2a2a30,#16161a); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; font-weight:700; letter-spacing:-0.02em; }
.ws-name { font-size:12.5px; font-weight:500; color:var(--ink-1); }
.ws-chev { color:var(--ink-4); font-size:9px; }
.big-mark { width:64px; height:64px; border-radius:14px; background:linear-gradient(135deg,#2a2a30,#16161a); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:26px; font-weight:700; letter-spacing:-0.02em; box-shadow:var(--shadow-md); }
.wordmark { font-family:var(--font-sans); font-size:22px; font-weight:600; letter-spacing:-0.01em; color:var(--ink-1); }
</style>
</head><body>
<div class="card" style="gap:18px;">
  <div class="row" style="gap:18px;align-items:center;">
    <div class="big-mark">IG</div>
    <div class="wordmark">IG&nbsp;Studio</div>
  </div>
  <hr class="divline">
  <div class="row" style="gap:14px;align-items:center;">
    <div class="ws-pill">
      <div class="ws-mark">IG</div>
      <div class="ws-name">Maison Roma</div>
      <div class="ws-chev">▼</div>
    </div>
    <div class="mono" style="color:var(--ink-4);">workspace pill — top-bar left</div>
  </div>
</div>
</body></html>
