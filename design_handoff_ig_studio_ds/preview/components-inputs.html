<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.search { height:30px; width:280px; background:var(--surface-2); border:1px solid var(--border); border-radius:7px; padding:0 10px 0 30px; font-size:12.5px; color:var(--ink-2); font-family:inherit; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 14 14' fill='none'><circle cx='6' cy='6' r='3.5' stroke='%239a9aa1' stroke-width='1.3'/><path d='M9 9l3 3' stroke='%239a9aa1' stroke-width='1.3' stroke-linecap='round'/></svg>"); background-repeat:no-repeat; background-position:10px center; background-size:13px 13px; outline:none; }
.search:focus { background-color:var(--surface); border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }
.input { height:32px; padding:0 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; font-size:12.5px; color:var(--ink-1); font-family:inherit; outline:none; width:200px; }
.input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }
.dd { height:28px; padding:0 8px 0 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-2); }
.dd b { color:var(--ink-1); font-weight:500; }
.dd .chev { color:var(--ink-4); font-size:9px; }
</style>
</head><body>
<div class="card">
  <div class="lbl">Inputs · search · dropdown</div>
  <input class="search" placeholder="Search styles, files, comments…">
  <div class="row" style="gap:8px;">
    <input class="input" placeholder="Style name">
    <input class="input" value="Style 247" style="border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring);">
  </div>
  <div class="row" style="gap:8px;">
    <span class="dd">Sort by <b>Last activity</b><span class="chev">▼</span></span>
    <span class="dd">Owner <b>Anyone</b><span class="chev">▼</span></span>
  </div>
</div>
</body></html>
