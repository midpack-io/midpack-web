<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.tabs { display:inline-flex; align-items:center; gap:2px; border-bottom:1px solid var(--border); margin-bottom:-1px; padding-bottom:0; }
.tab { padding:13px 14px 12px 14px; font-size:12.5px; color:var(--ink-3); border-bottom:2px solid transparent; cursor:pointer; display:inline-flex; align-items:center; gap:7px; font-weight:500; }
.tab.active { color:var(--ink-1); border-bottom-color:var(--ink-1); }
.tab .tab-count { font-family:var(--font-mono); font-size:10.5px; color:var(--ink-4); background:var(--surface-3); padding:1.5px 6px; border-radius:4px; font-weight:500; }
.tab.active .tab-count { background:var(--ink-1); color:#fff; }
</style>
</head><body>
<div class="card">
  <div class="lbl">Tabs · filter bar</div>
  <div style="border-bottom:1px solid var(--border);padding-bottom:0;">
    <div class="tabs" style="border-bottom:none;">
      <span class="tab active">All <span class="tab-count">42</span></span>
      <span class="tab">Needs you <span class="tab-count">3</span></span>
      <span class="tab">In review <span class="tab-count">12</span></span>
      <span class="tab">Returned <span class="tab-count">1</span></span>
      <span class="tab">In production <span class="tab-count">8</span></span>
      <span class="tab">Done <span class="tab-count">18</span></span>
    </div>
  </div>
  <div class="mono" style="color:var(--ink-4);margin-top:6px;">2px ink-1 underline marks active · count chip flips ink-1 on active</div>
</div>
</body></html>
