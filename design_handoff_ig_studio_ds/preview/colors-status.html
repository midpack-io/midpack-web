<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.chip {
  display:inline-flex; align-items:center; gap:5px;
  height:22px; padding:3px 8px 2px;
  border-radius:5px;
  font-family:var(--font-mono); font-size:10.5px; font-weight:600;
  letter-spacing:0.04em; text-transform:uppercase;
  line-height:1;
}
.chip svg { width:11px; height:11px; flex-shrink:0; }
</style>
</head><body>
<div class="card">
  <div class="lbl">Status palette — 6 hues</div>
  <div class="swatch-strip" style="--n:6;">
    <div class="swatch-cell"><div class="swatch" style="background:#eef2f7;border:1px solid #cbd5e1;"></div><div class="name">todo</div><div class="hex">#475569</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#e0ecff;border:1px solid #b4cdfa;"></div><div class="name">info</div><div class="hex">#2563eb</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#fef3c7;border:1px solid #fcd34d;"></div><div class="name">warn</div><div class="hex">#b45309</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#e6f0e9;border:1px solid #b8d8c2;"></div><div class="name">ok</div><div class="hex">#2f7a4a</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#fdecea;border:1px solid #f5b7b0;"></div><div class="name">coral</div><div class="hex">#b53527</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#ececea;border:1px solid #d4d4cf;"></div><div class="name">muted</div><div class="hex">#6b6b73</div></div>
  </div>
  <div class="row" style="gap:6px;flex-wrap:wrap;margin-top:6px;">
    <span class="chip" style="background:#eef2f7;color:#475569;box-shadow:0 0 0 1px #cbd5e1 inset;">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.5" stroke-dasharray="2 1.6"/></svg>TO DO
    </span>
    <span class="chip" style="background:#e0ecff;color:#1e40af;box-shadow:0 0 0 1px #b4cdfa inset;">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.5"/><circle cx="7" cy="7" r="1.8" fill="currentColor" stroke="none"/></svg>IN PROGRESS
    </span>
    <span class="chip" style="background:#fef3c7;color:#b45309;box-shadow:0 0 0 1px #fcd34d inset;">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.7"/><path d="M7 4.2v2.8l1.8 1.4"/></svg>IN REVIEW
    </span>
    <span class="chip" style="background:#e6f0e9;color:#2f7a4a;box-shadow:0 0 0 1px #b8d8c2 inset;">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.7"/><path d="M4.6 7.2 6.3 8.9 9.6 5.3"/></svg>DONE
    </span>
    <span class="chip" style="background:#ececea;color:#9a9aa1;box-shadow:0 0 0 1px #e6e6e1 inset;">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.7"/><path d="M4.6 4.6l4.8 4.8M9.4 4.6l-4.8 4.8"/></svg><span style="text-decoration:line-through;text-decoration-color:#c8c8cc;">CANCELED</span>
    </span>
    <span class="chip" style="background:#fdecea;color:#b53527;box-shadow:0 0 0 1px #f5b7b0 inset;">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.8 7.6a4.2 4.2 0 0 0 8-1.2"/><path d="M11.3 4.2v2.4H8.9"/></svg>REOPENED
    </span>
  </div>
</div>
</body></html>
