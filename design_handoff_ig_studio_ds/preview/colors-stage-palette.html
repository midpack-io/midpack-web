<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="lbl">Stage palette — 6 calm hues</div>
  <div style="display:flex;border-radius:8px;overflow:hidden;height:48px;">
    <div style="flex:1;background:#c1bfb6;"></div>
    <div style="flex:1;background:#9aacc1;"></div>
    <div style="flex:1;background:#b29ec1;"></div>
    <div style="flex:1;background:#d4ab5e;"></div>
    <div style="flex:1;background:#7e80df;"></div>
    <div style="flex:1;background:#5d9e76;"></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;font-family:var(--font-mono);font-size:9.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.05em;text-align:center;">
    <div>Brief<br><span style="color:var(--ink-4);">#c1bfb6</span></div>
    <div>Design<br><span style="color:var(--ink-4);">#9aacc1</span></div>
    <div>Copy<br><span style="color:var(--ink-4);">#b29ec1</span></div>
    <div>Review<br><span style="color:var(--ink-4);">#d4ab5e</span></div>
    <div>Approval<br><span style="color:var(--ink-4);">#7e80df</span></div>
    <div>Production<br><span style="color:var(--ink-4);">#5d9e76</span></div>
  </div>
</div>
</body></html>
