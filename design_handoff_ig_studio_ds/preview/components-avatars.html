<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css">
<style>
.card { gap: 10px; }
.avatar {
  width: 24px; height: 24px;
  border-radius: 50%;
  color: #fff;
  font-size: 10px; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  position: relative;
  cursor: pointer;
  transition:
    transform 140ms cubic-bezier(0.2, 0.7, 0.3, 1),
    box-shadow 140ms ease;
}
.avatar:focus-visible { outline: none; }

/* Solo avatar hover — outside a person-chip */
.solo:hover {
  transform: translateY(-1px) scale(1.05);
  box-shadow:
    0 0 0 2px var(--surface),
    0 0 0 4px var(--accent-ring),
    0 4px 10px -2px rgba(20,20,28,0.18);
  z-index: 2;
}
.solo:active { transform: translateY(0) scale(1.0); }
.solo .tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%) translateY(2px);
  background: var(--ink-1);
  color: #fff;
  padding: 3px 7px;
  border-radius: 5px;
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 140ms ease, transform 140ms ease;
  z-index: 3;
  box-shadow: var(--shadow-md);
}
.solo .tip::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: var(--ink-1);
}
.solo:hover .tip { opacity: 1; transform: translateX(-50%) translateY(0); }

.av-anna   { background: var(--av-anna); }
.av-olena  { background: var(--av-olena); }
.av-lina   { background: var(--av-lina); }
.av-pavlo  { background: var(--av-pavlo); }
.av-yuri   { background: var(--av-yuri); }
.av-marta  { background: var(--av-marta); }
.av-roma   { background: var(--av-roma); }
.av-yulia  { background: var(--av-yulia); }
.av-founder { background: var(--av-founder); }
.av-none { background: transparent; border: 1px dashed var(--ink-5); color: var(--ink-4); }

.stack { display: inline-flex; align-items: center; }
.stack > .avatar + .avatar { margin-left: -6px; border: 2px solid var(--surface); }

/* Approver mark */
.approver::after {
  content: "\2713";
  position: absolute; bottom: -2px; right: -2px;
  width: 11px; height: 11px;
  background: var(--ok); color: #fff;
  border-radius: 50%;
  font-size: 8px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--surface);
}

/* ============ Person-chip — same hover as avatar, applied to container ============ */
.person-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 2px 8px 2px 2px;
  border-radius: 999px;
  border: 1px solid transparent;
  background: transparent;
  font-family: inherit;
  font-size: 12px;
  color: var(--ink-1);
  cursor: pointer;
  position: relative;
  transition:
    transform 140ms cubic-bezier(0.2, 0.7, 0.3, 1),
    box-shadow 140ms ease,
    background 140ms ease,
    border-color 140ms ease;
}
.person-chip:hover {
  transform: translateY(-1px);
  background: var(--surface);
  border-color: var(--accent-ring);
  box-shadow:
    0 0 0 2px var(--surface),
    0 0 0 4px var(--accent-ring),
    0 4px 10px -2px rgba(20,20,28,0.18);
  z-index: 2;
}
.person-chip:active { transform: translateY(0); }
.person-chip:focus-visible {
  outline: none;
  background: var(--surface);
  border-color: var(--accent);
  box-shadow:
    0 0 0 2px var(--surface),
    0 0 0 4px var(--accent);
}
.person-chip .name { font-weight: 500; white-space: nowrap; }
.person-chip .meta { font-size: 11px; color: var(--ink-3); white-space: nowrap; }

.person-chip.unassigned {
  border: 1px dashed var(--border-strong);
  padding: 2px 10px 2px 3px;
}
.person-chip.unassigned .name { color: var(--ink-3); font-weight: 400; }
.person-chip.unassigned:hover {
  border-style: solid;
  border-color: var(--accent-ring);
}
.person-chip.unassigned:hover .name { color: var(--ink-1); }

/* Layout */
.row-grid {
  display: grid;
  grid-template-columns: 92px 1fr 1fr;
  gap: 8px 16px;
  align-items: center;
}
.row-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-4);
  font-weight: 600;
}
.col-head {
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-4);
  font-weight: 600;
}
.solo-row { padding: 6px 0 2px 0; }
</style>
</head><body>
<div class="card">
  <div class="lbl">Avatars — solo + person-chip (assigned / unassigned)</div>

  <!-- Solo row -->
  <div class="row solo-row" style="gap: 12px; flex-wrap: wrap;">
    <span class="avatar solo av-anna" tabindex="0">AN<span class="tip">Anna Lev</span></span>
    <span class="avatar solo av-olena" tabindex="0">OL<span class="tip">Olena Bondar</span></span>
    <span class="avatar solo av-lina" tabindex="0">LI<span class="tip">Lina Park</span></span>
    <span class="avatar solo av-pavlo" tabindex="0">PA<span class="tip">Pavlo Krym</span></span>
    <span class="avatar solo av-yuri" tabindex="0">YU<span class="tip">Yuri Tan</span></span>
    <span class="avatar solo av-marta" tabindex="0">MA<span class="tip">Marta Olesh</span></span>
    <span class="avatar solo av-roma" tabindex="0">RO<span class="tip">Roma Fyk</span></span>
    <span class="avatar solo av-yulia" tabindex="0">YL<span class="tip">Yulia Mira</span></span>
    <span class="avatar solo av-none" tabindex="0">?<span class="tip">Unassigned</span></span>
  </div>

  <hr class="divline" style="margin: 2px 0;">

  <div class="row-grid">
    <div></div>
    <div class="col-head">Assigned</div>
    <div class="col-head">Unassigned</div>

    <div class="row-label">Name</div>
    <div>
      <button class="person-chip" tabindex="0">
        <span class="avatar av-marta">MA</span>
        <span class="name">Marta Olesh</span>
      </button>
    </div>
    <div>
      <button class="person-chip unassigned" tabindex="0">
        <span class="avatar av-none">?</span>
        <span class="name">Unassigned</span>
      </button>
    </div>

    <div class="row-label">With role</div>
    <div>
      <button class="person-chip" tabindex="0">
        <span class="avatar av-olena approver">OL</span>
        <span class="name">Olena</span>
        <span class="meta">\u00b7 Approver</span>
      </button>
    </div>
    <div>
      <button class="person-chip unassigned" tabindex="0">
        <span class="avatar av-none">?</span>
        <span class="name">Assign approver</span>
      </button>
    </div>

    <div class="row-label">Stack</div>
    <div>
      <button class="person-chip" tabindex="0">
        <span class="stack">
          <span class="avatar av-marta">MA</span>
          <span class="avatar av-olena approver">OL</span>
        </span>
        <span class="name">Marta + Olena</span>
      </button>
    </div>
    <div>
      <button class="person-chip unassigned" tabindex="0">
        <span class="avatar av-none">?</span>
        <span class="name">Assign team</span>
      </button>
    </div>
  </div>
</div>
</body></html>
