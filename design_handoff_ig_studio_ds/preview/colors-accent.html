<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="lbl">Accent — indigo (active, focus, current)</div>
  <div class="swatch-strip" style="--n:4;">
    <div class="swatch-cell"><div class="swatch" style="background:#4f46e5;"></div><div class="name">accent</div><div class="hex">#4f46e5</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#eef0ff;"></div><div class="name">accent-soft</div><div class="hex">#eef0ff</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#c7caff;"></div><div class="name">accent-ring</div><div class="hex">#c7caff</div></div>
    <div class="swatch-cell"><div class="swatch" style="background:#312e81;"></div><div class="name">accent-ink</div><div class="hex">#312e81</div></div>
  </div>
  <div class="row" style="margin-top:6px;gap:12px;align-items:center;">
    <button style="height:32px;padding:0 12px;border-radius:7px;border:1px solid #4f46e5;background:#4f46e5;color:#fff;font-family:inherit;font-size:12.5px;font-weight:500;">Accent button</button>
    <span style="height:30px;display:inline-flex;align-items:center;padding:0 12px;border-radius:7px;border:1px solid #4f46e5;background:#fff;color:#16161a;font-size:12px;box-shadow:0 0 0 3px #c7caff;">Focus state</span>
    <span style="font-family:var(--font-mono);font-size:10.5px;color:#312e81;background:#eef0ff;border:1px solid #c7caff;padding:1px 5px;border-radius:4px;font-weight:600;">↻ 2</span>
  </div>
</div>
</body></html>
